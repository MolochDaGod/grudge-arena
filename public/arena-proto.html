<!DOCTYPE html>
<html>
<head>
  <title>Grudge Arena Prototype</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
    #ui { position: fixed; top: 10px; left: 10px; color: #f0c060; font: 12px monospace; z-index: 10; pointer-events: none; }
    #animName { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); color: #fff; font: 16px 'Cinzel', serif; z-index: 10; }
  </style>
</head>
<body>
<div id="ui">Loading...</div>
<div id="animName"></div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const ui = document.getElementById('ui');
const animNameEl = document.getElementById('animName');
const log = (msg) => { ui.textContent = msg; };

// ── Scene setup ─────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 80);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.05, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0xb0c4de, 0.6));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x362d1e, 0.4));
const sun = new THREE.DirectionalLight(0xfff5e1, 1.2);
sun.position.set(10, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = sun.shadow.camera.bottom = -30;
sun.shadow.camera.right = sun.shadow.camera.top = 30;
sun.shadow.bias = -0.001;
scene.add(sun);

// ── Collision Layers ────────────────────────────────────────────────
const Layers = {
  TERRAIN:     0,  // Ground, walls
  PLAYER:      1,  // Player character
  ALLY:        2,  // Allied NPCs
  ENEMY:       3,  // Enemy NPCs
  PROJECTILE:  4,  // Spell projectiles
  ENVIRONMENT: 5,  // Pillars, obstacles
  TRIGGER:     6,  // Pickup zones, area effects
};

// Ground (terrain layer)
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(30, 64),
  new THREE.MeshStandardMaterial({ color: 0x2d3748, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
ground.layers.set(Layers.TERRAIN);
ground.userData.layer = 'terrain';
scene.add(ground);

// Ring (environment layer)
const ring = new THREE.Mesh(
  new THREE.RingGeometry(29, 30, 64),
  new THREE.MeshStandardMaterial({ color: 0xc9a84c, emissive: 0x8b6914, emissiveIntensity: 0.3, metalness: 0.8, roughness: 0.3 })
);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.01;
ring.layers.set(Layers.ENVIRONMENT);
scene.add(ring);

// Pillars (environment layer, block LoS)
for (let i = 0; i < 4; i++) {
  const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
  const pillar = new THREE.Mesh(
    new THREE.CylinderGeometry(1.2, 1.5, 6, 8),
    new THREE.MeshStandardMaterial({ color: 0x333355, roughness: 0.6, metalness: 0.4 })
  );
  pillar.position.set(Math.cos(angle) * 12, 3, Math.sin(angle) * 12);
  pillar.castShadow = true;
  pillar.receiveShadow = true;
  pillar.layers.set(Layers.ENVIRONMENT);
  pillar.userData.layer = 'environment';
  pillar.userData.blocksLoS = true;
  scene.add(pillar);
}

// ── Load character + animation library ──────────────────────────────
const loader = new GLTFLoader();
log('Loading character...');

const charGltf = await new Promise((r, e) => loader.load('/models/human.glb', r, undefined, e));
const character = charGltf.scene;
character.traverse(c => {
  if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; c.frustumCulled = false; }
});
// Set character on player layer, feet on ground
character.layers.set(Layers.PLAYER);
character.userData.layer = 'player';
scene.add(character);

const mixer = new THREE.AnimationMixer(character);

// Register embedded animations
const embeddedActions = {};
for (const clip of charGltf.animations) {
  embeddedActions[clip.name.toLowerCase()] = mixer.clipAction(clip);
}
log(`Character loaded. Embedded: ${Object.keys(embeddedActions).join(', ')}`);

// Load animation library
log('Loading animations...');
const animGltf = await new Promise((r, e) => loader.load('/models/animation-library.glb', r, undefined, e));

const actions = {};
for (const clip of animGltf.animations) {
  // DO NOT scale position tracks — the Armature's 0.01 root scale
  // already converts centimeter bone positions to world meters.
  // Scaling here would DOUBLE the conversion, sinking the character.
  
  // Bind clip to the character scene
  const action = mixer.clipAction(clip, character);
  actions[clip.name] = action;
}

// Also add embedded as fallbacks
for (const [name, action] of Object.entries(embeddedActions)) {
  if (!actions[name]) actions[name] = action;
}

log(`Ready! ${Object.keys(actions).length} animations: ${Object.keys(actions).join(', ')}`);

// ── Animation controller ────────────────────────────────────────────
let currentAction = null;
let currentName = '';

function playAnim(name, loop = true, speed = 1) {
  const action = actions[name];
  if (!action) { console.warn('No anim:', name); return; }
  if (currentName === name && currentAction?.isRunning()) return;

  action.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
  action.clampWhenFinished = !loop;
  action.timeScale = speed;

  if (currentAction && currentAction !== action) {
    action.reset().play();
    currentAction.crossFadeTo(action, 0.15, true);
  } else {
    action.reset().play();
  }
  currentAction = action;
  currentName = name;
  animNameEl.textContent = name;
}

function playOnce(name, speed = 1) {
  const action = actions[name];
  if (!action) return;
  action.setLoop(THREE.LoopOnce, 1);
  action.clampWhenFinished = true;
  action.timeScale = speed;
  if (currentAction) currentAction.crossFadeTo(action, 0.1, true);
  action.reset().play();
  currentAction = action;
  currentName = name;
  animNameEl.textContent = name;

  // Return to idle when done
  mixer.addEventListener('finished', function onFinish(e) {
    if (e.action === action) {
      mixer.removeEventListener('finished', onFinish);
      playAnim('idle');
    }
  });
}

// Start idle
playAnim('idle');

// ── WoW-style camera ────────────────────────────────────────────────
let cameraYaw = Math.PI;   // Horizontal angle around character
let cameraPitch = 0.3;      // Vertical angle (0 = level, PI/2 = top-down)
let cameraDistance = 6;
let isRightMouseDown = false;

// Right-click drag to rotate camera
renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.button === 2) isRightMouseDown = true;
});
document.addEventListener('mouseup', (e) => {
  if (e.button === 2) isRightMouseDown = false;
});
document.addEventListener('mousemove', (e) => {
  if (isRightMouseDown) {
    cameraYaw -= e.movementX * 0.005;
    cameraPitch = Math.max(0.1, Math.min(1.2, cameraPitch + e.movementY * 0.005));
  }
});

// Scroll to zoom
document.addEventListener('wheel', (e) => {
  cameraDistance = Math.max(2, Math.min(15, cameraDistance + e.deltaY * 0.005));
}, { passive: true });

document.addEventListener('contextmenu', (e) => e.preventDefault());

function updateCamera() {
  const target = character.position.clone();
  target.y += 1.2; // Look at chest height

  const x = Math.sin(cameraYaw) * Math.cos(cameraPitch) * cameraDistance;
  const y = Math.sin(cameraPitch) * cameraDistance;
  const z = Math.cos(cameraYaw) * Math.cos(cameraPitch) * cameraDistance;

  camera.position.set(target.x + x, target.y + y, target.z + z);
  camera.lookAt(target);
}

// ── Input ───────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

// Click = attack
renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.button === 0) { // LMB
    const attacks = ['attack1', 'attack2', 'attack3', 'attack4'];
    playOnce(attacks[Math.floor(Math.random() * attacks.length)], 1.2);
  }
});

// Number keys = specific animations
document.addEventListener('keydown', (e) => {
  const map = { '1': 'attack1', '2': 'attack2', '3': 'swing', '4': 'cast', '5': 'aoe' };
  if (map[e.key]) playOnce(map[e.key]);
  if (e.key === 'Control') playOnce('roll', 1.5);
  if (e.key === 'Alt') { e.preventDefault(); playOnce('dodge', 1.5); }
  if (e.key === ' ') playOnce('jump');
  if (e.key === 'q') playOnce('block');
  if (e.key === 't') playOnce('taunt');
});

// ── Game loop ───────────────────────────────────────────────────────
const clock = new THREE.Clock();
const moveSpeed = 5;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  // Movement
  let moveX = 0, moveZ = 0;
  if (keys['w']) moveZ -= 1;
  if (keys['s']) moveZ += 1;
  if (keys['a']) moveX -= 1;
  if (keys['d']) moveX += 1;

  const isMoving = moveX !== 0 || moveZ !== 0;

  if (isMoving) {
    const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
    moveX /= len; moveZ /= len;

    const speed = keys['shift'] ? moveSpeed * 1.5 : moveSpeed;
    character.position.x += moveX * speed * dt;
    character.position.z += moveZ * speed * dt;

    // Face movement direction (relative to camera)
    const moveAngle = Math.atan2(moveX, moveZ);
    character.rotation.y = cameraYaw + moveAngle;

    // Animation
    if (currentName !== 'roll' && currentName !== 'dodge' && currentName !== 'jump'
        && !currentName.startsWith('attack') && currentName !== 'swing'
        && currentName !== 'cast' && currentName !== 'aoe') {
      playAnim(keys['shift'] ? 'sprint' : 'run');
    }
  } else {
    if (currentName === 'run' || currentName === 'sprint' || currentName === 'walk') {
      playAnim('idle');
    }
  }

  // Clamp to arena
  const limit = 28;
  character.position.x = Math.max(-limit, Math.min(limit, character.position.x));
  character.position.z = Math.max(-limit, Math.min(limit, character.position.z));

  mixer.update(dt);
  updateCamera();
  renderer.render(scene, camera);

  // UI
  const pos = character.position;
  log(`Pos: ${pos.x.toFixed(1)}, ${pos.z.toFixed(1)} | Anim: ${currentName} | FPS: ${(1/dt).toFixed(0)}`);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
